<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Éditeur de Carte — Fidelyoo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Inter',sans-serif;background:#0f0f13;color:#f0ede8;}</style>
</head>
<body class="antialiased">
  <header class="border-b border-white/8 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-4">
      <a href="app.html" class="text-white/40 hover:text-white text-sm transition">← Dashboard</a>
      <span class="text-white/20">|</span>
      <span class="font-semibold">Éditeur de carte fidélité</span>
    </div>
    <button onclick="saveDraft()" class="bg-violet-600 hover:bg-violet-500 text-white text-sm font-medium px-4 py-2 rounded-lg transition">Enregistrer</button>
  </header>

  <div class="flex h-[calc(100vh-65px)]">
    <!-- Editor Panel -->
    <div class="w-96 border-r border-white/8 overflow-auto p-6 space-y-6">
      <div>
        <label class="block text-xs font-medium text-white/50 uppercase tracking-wide mb-3">Nom du commerce</label>
        <input id="shop-name" type="text" value="Ma Boulangerie" oninput="updatePreview()" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-violet-500">
      </div>
      <div>
        <label class="block text-xs font-medium text-white/50 uppercase tracking-wide mb-3">Slogan</label>
        <input id="slogan" type="text" value="Votre fidélité récompensée" oninput="updatePreview()" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-violet-500">
      </div>
      <div>
        <label class="block text-xs font-medium text-white/50 uppercase tracking-wide mb-3">Couleur principale</label>
        <div class="flex gap-2 flex-wrap">
          <button onclick="setColor('#7c3aed')" class="w-8 h-8 rounded-full bg-violet-600 ring-2 ring-violet-400 ring-offset-2 ring-offset-[#0f0f13] color-btn"></button>
          <button onclick="setColor('#0284c7')" class="w-8 h-8 rounded-full bg-sky-600 color-btn"></button>
          <button onclick="setColor('#059669')" class="w-8 h-8 rounded-full bg-emerald-600 color-btn"></button>
          <button onclick="setColor('#dc2626')" class="w-8 h-8 rounded-full bg-red-600 color-btn"></button>
          <button onclick="setColor('#d97706')" class="w-8 h-8 rounded-full bg-amber-600 color-btn"></button>
          <button onclick="setColor('#db2777')" class="w-8 h-8 rounded-full bg-pink-600 color-btn"></button>
          <input type="color" id="custom-color" oninput="setColor(this.value)" value="#7c3aed" class="w-8 h-8 rounded-full cursor-pointer bg-transparent border-0">
        </div>
      </div>
      <div>
        <label class="block text-xs font-medium text-white/50 uppercase tracking-wide mb-3">Nombre de tampons</label>
        <div class="flex gap-2">
          <input type="range" id="stamp-count" min="5" max="20" value="10" oninput="document.getElementById('stamp-val').textContent=this.value;updatePreview()" class="flex-1 accent-violet-500">
          <span id="stamp-val" class="text-white font-semibold w-8 text-center">10</span>
        </div>
      </div>
      <div>
        <label class="block text-xs font-medium text-white/50 uppercase tracking-wide mb-3">Récompense</label>
        <input id="reward" type="text" value="1 café offert" oninput="updatePreview()" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-violet-500">
      </div>
    </div>

    <!-- Preview Panel -->
    <div class="flex-1 flex items-center justify-center bg-white/2 p-8">
      <div class="space-y-6 text-center">
        <p class="text-white/30 text-sm uppercase tracking-wide">Aperçu de la carte</p>
        
        <!-- Card Preview -->
        <div id="card-preview" class="w-80 rounded-3xl p-6 text-white relative overflow-hidden" style="background: linear-gradient(135deg, #7c3aed, #4f46e5);">
          <div class="flex justify-between items-start mb-8">
            <div>
              <div id="preview-shop" class="text-xl font-bold">Ma Boulangerie</div>
              <div id="preview-slogan" class="text-white/70 text-sm mt-0.5">Votre fidélité récompensée</div>
            </div>
            <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center text-xl">🎁</div>
          </div>
          <div id="preview-stamps" class="flex gap-2 flex-wrap mb-6"></div>
          <div class="flex justify-between items-end">
            <div>
              <div class="text-white/60 text-xs">Récompense</div>
              <div id="preview-reward" class="font-semibold text-sm">1 café offert</div>
            </div>
            <div class="text-right">
              <div class="text-white/60 text-xs">Client</div>
              <div class="font-medium text-sm">Jean Martin</div>
            </div>
          </div>
        </div>

        <button onclick="saveDraft()" class="bg-violet-600 hover:bg-violet-500 text-white font-semibold px-8 py-3 rounded-xl transition shadow-lg shadow-violet-500/20">
          ✅ Publier cette carte
        </button>
      </div>
    </div>
  </div>

  <script>
    let currentColor = '#7c3aed';
    
    function setColor(c) {
      currentColor = c;
      document.getElementById('card-preview').style.background = 'linear-gradient(135deg, '+c+', '+c+'aa)';
      document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('ring-2','ring-violet-400','ring-offset-2','ring-offset-[#0f0f13]'));
    }
    
    function updatePreview() {
      document.getElementById('preview-shop').textContent = document.getElementById('shop-name').value;
      document.getElementById('preview-slogan').textContent = document.getElementById('slogan').value;
      document.getElementById('preview-reward').textContent = document.getElementById('reward').value;
      const count = parseInt(document.getElementById('stamp-count').value);
      let stamps = '';
      for (let i = 0; i < count; i++) stamps += (i < Math.floor(count*0.6) ? '<span class="text-lg">🟣</span>' : '<span class="text-lg">⚪</span>');
      document.getElementById('preview-stamps').innerHTML = stamps;
    }
    
    function saveDraft() {
      alert('Carte enregistrée ! Vos clients peuvent maintenant l\'ajouter à leur Wallet.');
    }
    
    updatePreview();
  </script>
</body>
</html>
