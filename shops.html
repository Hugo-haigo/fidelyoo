<style>
  html, body { height: 100%; }
  body { font-family: 'Inter Tight', ui-sans-serif, system-ui, sans-serif; -webkit-font-smoothing: antialiased; color: #0E0E10; background: #FAFAF7; }
  .font-serif { font-family: 'Instrument Serif', 'Times New Roman', serif; letter-spacing: -0.02em; }
  .font-display { font-family: 'Inter Tight', sans-serif; font-weight: 800; letter-spacing: -0.05em; }
  .font-tight { font-family: 'Inter Tight', sans-serif; letter-spacing: -0.02em; }
  .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; letter-spacing: 0.02em; }
  .eyebrow { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: #A29F97; }
  .tabular-nums { font-variant-numeric: tabular-nums; }

  /* Sidebar nav */
  .nav-link { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; color: rgba(250,250,247,0.62); font-size: 13px; transition: all .15s; }
  .nav-link:hover { color: #FAFAF7; background: rgba(250,250,247,0.04); }
  .nav-link.active { color: #FAFAF7; background: rgba(250,250,247,0.08); }
  .nav-link svg { width: 16px; height: 16px; flex-shrink: 0; }

  /* Chart */
  .chart-line { stroke: #9A2232; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .chart-fill { fill: url(#chart-grad); opacity: 0.9; }
  .chart-grid line { stroke: rgba(14,14,16,0.06); stroke-dasharray: 2 4; }

  /* Animated pulse */
  @keyframes pulse-dot { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.85); } }
  .pulse-dot { animation: pulse-dot 1.8s ease-in-out infinite; }

  /* Reveal */
  .reveal { opacity: 0; transform: translateY(14px); transition: opacity .7s cubic-bezier(.16,1,.3,1), transform .7s cubic-bezier(.16,1,.3,1); }
  .reveal.in { opacity: 1; transform: none; }
  @media (prefers-reduced-motion: reduce) { .reveal { opacity:1; transform:none; transition:none; } }

  /* Cards */
  .card { background: #FFFFFF; border: 1px solid rgba(14,14,16,0.08); border-radius: 14px; }
  .card-paper { background: #F2F1EC; border: 1px solid rgba(14,14,16,0.06); border-radius: 14px; }

  /* Scrollbar */
  .scroll-soft::-webkit-scrollbar { width: 6px; }
  .scroll-soft::-webkit-scrollbar-thumb { background: rgba(14,14,16,0.15); border-radius: 9999px; }
</style>

<script type="module">
  import { supabase, getCurrentMerchant } from './js/supabase-client.js';
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) { window.location.href = 'login.html'; }
  const merchant = await getCurrentMerchant();
  if (!merchant) { window.location.href = 'login.html'; }
  window.__merchant = merchant;
  function setText(id, val) { const el = document.getElementById(id); if (el) el.textContent = val; }
  setText('sb-merchant-name', merchant.business_name || '—');
  setText('sb-merchant-initials', (merchant.business_name || '?').substring(0, 2).toUpperCase());
  setText('tb-merchant-name', merchant.business_name || '—');
  setText('sb-user-email', session.user.email);
  setText('sb-user-name', merchant.business_name || '—');
  setText('sb-user-initials', (session.user.email || 'U').substring(0, 2).toUpperCase());
  const { data: stats } = await supabase.from('merchant_stats').select('*').eq('merchant_id', merchant.id).maybeSingle();
  if (stats) setText('sb-clients-count', stats.customers_count || 0);
  const logoutBtn = document.getElementById('logoutBtn');
  if (logoutBtn) logoutBtn.addEventListener('click', async () => { await supabase.auth.signOut(); window.location.href = 'login.html'; });

  async function loadShops() { const { data: shops } = await supabase.from('shops').select('*').eq('merchant_id', merchant.id).order('created_at'); const list = document.getElementById('shopsList'); list.innerHTML = ''; if (!shops || shops.length === 0) { list.innerHTML = '<p class="text-mute">Aucune boutique.</p>'; return; } shops.forEach(s => { const row = document.createElement('div'); row.className = 'p-4 rounded-xl border border-line flex items-center justify-between'; row.innerHTML = '<div><div class="font-medium">' + s.name + '</div><div class="text-mute text-[12px]">' + (s.address || '') + ' ' + (s.city || '') + '</div></div>' + (s.is_main ? '<span class="px-2 py-0.5 rounded text-[10.5px] font-mono bg-blue-100 text-blue-800">Principale</span>' : '<button data-id="' + s.id + '" class="rm-shop text-[12px] text-red-600 hover:underline">Supprimer</button>'); list.appendChild(row); }); list.querySelectorAll('.rm-shop').forEach(b => b.addEventListener('click', async (e) => { if (!confirm('Supprimer cette boutique ?')) return; await supabase.from('shops').delete().eq('id', e.target.dataset.id); loadShops(); })); } loadShops(); document.getElementById('addShop').addEventListener('click', () => document.getElementById('shopModal').classList.remove('hidden')); document.getElementById('sCancel').addEventListener('click', () => document.getElementById('shopModal').classList.add('hidden')); document.getElementById('shopForm').addEventListener('submit', async (e) => { e.preventDefault(); const name = document.getElementById('sName').value.trim(); const address = document.getElementById('sAddress').value.trim(); const city = document.getElementById('sCity').value.trim(); await supabase.from('shops').insert({ merchant_id: merchant.id, name, address: address || null, city: city || null, is_main: false }); document.getElementById('shopModal').classList.add('hidden'); loadShops(); });
</script>
