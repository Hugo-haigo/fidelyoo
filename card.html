<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Fidelyoo — Ma carte de fidélité</title>
<link rel="manifest" href="/fidelyoo/manifest.json" />
<meta name="theme-color" content="#0b0b0c" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Fidelyoo" />
<link rel="apple-touch-icon" href="https://api.dicebear.com/7.x/shapes/png?seed=fidelyoo&backgroundColor=0b0b0c&size=180" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Inter Tight', system-ui, sans-serif; background: #FAFAF7; color: #0E0E10; }
  .font-serif { font-family: 'Instrument Serif', 'Times New Roman', serif; }
  .inp { width: 100%; padding: 12px 14px; border: 1px solid #e5e5e5; border-radius: 10px; font-size: 15px; background: white; }
  .inp:focus { outline: none; border-color: #0E0E10; }
  .lbl { display: block; font-size: 12px; font-weight: 500; color: #6b6b6b; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .stamp { width: 38px; height: 38px; border-radius: 50%; border: 2px dashed rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; }
  .stamp.filled { background: white; border-style: solid; border-color: white; }
  .stamp.filled::after { content: "\2713"; color: #0E0E10; font-weight: 700; }
</style>
</head>
<body class="min-h-screen">
<div class="max-w-md mx-auto px-5 py-8">
  <div id="loading" class="text-center py-20 text-gray-500">Chargement...</div>
  <div id="errorBox" class="hidden bg-red-50 text-red-700 p-4 rounded-lg text-sm"></div>
  <div id="signupView" class="hidden">
    <div class="text-center mb-6">
      <div class="text-xs uppercase tracking-widest text-gray-500 mb-2" id="merchantTag"></div>
      <h1 class="font-serif text-4xl mb-2" id="cardTitle">Carte de fidelite</h1>
      <p class="text-gray-600 text-sm" id="cardReward"></p>
    </div>
    <div id="cardBoxSignup" class="rounded-2xl p-6 mb-6" style="background:#0E0E10;color:#FFFFFF;">
      <div class="flex justify-between items-start mb-8">
        <div>
          <div class="text-xs opacity-60 uppercase tracking-widest" id="cardBrand">FIDELYOO</div>
          <div class="text-lg font-medium mt-1" id="cardBrandName">--</div>
        </div>
        <div class="text-xs opacity-60">Carte digitale</div>
      </div>
      <div class="grid grid-cols-5 gap-2 mb-4" id="stampGrid"></div>
      <div class="text-xs opacity-70 text-center" id="rewardText">--</div>
    </div>
    <form id="signupForm" class="space-y-4">
      <div><label class="lbl">Prenom</label><input id="firstName" type="text" required class="inp" placeholder="Marie"/></div>
      <div><label class="lbl">Nom</label><input id="lastName" type="text" required class="inp" placeholder="Dupont"/></div>
      <div><label class="lbl">Email</label><input id="email" type="email" required class="inp" placeholder="marie@email.com"/></div>
      <div><label class="lbl">Telephone (optionnel)</label><input id="phone" type="tel" class="inp" placeholder="06 12 34 56 78"/></div>
      <button type="submit" id="submitBtn" class="w-full h-12 rounded-lg bg-black text-white font-medium hover:bg-gray-800 transition-colors">Activer ma carte</button>
      <p class="text-xs text-gray-500 text-center">En activant, vous acceptez de recevoir des notifications liees a votre fidelite.</p>
    </form>
  </div>
  <div id="cardView" class="hidden">
    <div class="text-center mb-4">
      <div class="text-xs uppercase tracking-widest text-gray-500 mb-2" id="cardViewMerchant"></div>
      <h1 class="font-serif text-3xl">Bienvenue !</h1>
      <p class="text-gray-600 text-sm mt-1" id="welcomeName"></p>
    </div>
    <div id="cardBoxLive" class="rounded-2xl p-6 mb-6" style="background:#0E0E10;color:#FFFFFF;">
      <div class="flex justify-between items-start mb-6">
        <div>
          <div class="text-xs opacity-60 uppercase tracking-widest">FIDELYOO</div>
          <div class="text-lg font-medium mt-1" id="cardViewBrand">--</div>
        </div>
        <div class="text-xs opacity-60" id="customerNumber"></div>
      </div>
      <div class="grid grid-cols-5 gap-2 mb-3" id="liveStampGrid"></div>
      <div class="text-xs opacity-70 text-center mb-2" id="liveStampText">--</div>
      <div class="bg-white p-3 rounded-xl mt-4 flex justify-center"><canvas id="qrCanvas"></canvas></div>
      <div class="text-[10px] opacity-50 text-center mt-2 uppercase tracking-wider">Presentez ce QR au commercant</div>
    </div>
    <div class="text-center text-xs text-gray-500" id="rewardStatus"></div>
  </div>
</div>
<script type="module">
  function ensureQR(){return new Promise((res,rej)=>{if(typeof qrcode!=='undefined')return res();const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js';s.onload=()=>res();s.onerror=()=>rej(new Error('QR lib load failed'));document.head.appendChild(s);});}

  import { supabase } from './js/supabase-client.js';
  function applyCardColors(card, boxId) {
    const box = document.getElementById(boxId);
    if (!box) return;
    const bg = card.bg_color || '#0E0E10';
    const accent = card.accent_color || '#9A2232';
    const text = card.text_color || '#FFFFFF';
    box.style.background = bg;
    box.style.color = text;
    // Cascade text colors
    box.querySelectorAll('*').forEach(el => { el.style.color = text; });
    // Stamps: filled use accent, empty use border in textColor with transparency
    box.querySelectorAll('.stamp.filled').forEach(el => {
      el.style.background = accent;
      el.style.borderColor = accent;
      el.style.color = text;
    });
    box.querySelectorAll('.stamp:not(.filled)').forEach(el => {
      el.style.borderColor = text;
      el.style.opacity = '0.3';
    });
    // QR background block stays white
    box.querySelectorAll('.bg-white').forEach(el => {
      el.style.background = '#FFFFFF';
      el.style.color = '#0E0E10';
      el.querySelectorAll('*').forEach(c => { c.style.color = '#0E0E10'; });
    });
  }

  const params = new URLSearchParams(location.search);
  const merchantSlug = params.get('m');
  const customerQr = params.get('c');
  function show(id) { ['loading','signupView','cardView','errorBox'].forEach(x => { const el = document.getElementById(x); if (el) el.classList.toggle('hidden', x !== id); }); }
  function showError(msg) { const el = document.getElementById('errorBox'); el.textContent = msg; el.classList.remove('hidden'); }
  function buildStampGrid(gridId, total, filled) { const grid = document.getElementById(gridId); grid.innerHTML = ''; for (let i = 0; i < total; i++) { const d = document.createElement('div'); d.className = 'stamp' + (i < filled ? ' filled' : ''); grid.appendChild(d); } }
  if (!merchantSlug) { show('errorBox'); showError('Lien invalide. Code commercant manquant.'); }
  else {
    try {
      const { data: merchant, error: mErr } = await supabase.from('merchants').select('*').eq('slug', merchantSlug).maybeSingle();
      if (mErr) throw mErr;
      if (!merchant) { showError('Commercant introuvable.'); show('errorBox'); throw new Error('no merchant'); }
      const { data: card, error: cErr } = await supabase.from('cards').select('*').eq('merchant_id', merchant.id).eq('is_published', true).order('created_at', { ascending: false }).limit(1).maybeSingle();
      if (cErr) throw cErr;
      if (!card) { showError('Aucune carte publiee pour ce commercant.'); show('errorBox'); throw new Error('no card'); }
      window.__merchant = merchant;
      window.__card = card;
      if (customerQr) {
        const { data: customer } = await supabase.from('customers').select('*').eq('qr_code', customerQr).maybeSingle();
        if (customer) { await renderCardView(merchant, card, customer); }
        else { showError('Carte client introuvable.'); show('errorBox'); }
      } else {
        document.getElementById('merchantTag').textContent = merchant.business_name;
        document.getElementById('cardBrand').textContent = (merchant.business_name||'').toUpperCase();
        document.getElementById('cardBrandName').textContent = card.name;
        document.getElementById('cardTitle').textContent = card.name; applyCardColors(card, 'cardBoxSignup');
        document.getElementById('cardReward').textContent = card.reward_description;
        document.getElementById('rewardText').textContent = 'Recompense : ' + card.reward_description;
        buildStampGrid('stampGrid', Math.min(card.stamps_required, 10), 0);
        show('signupView');
      }
    } catch (err) { console.error(err); if (!document.getElementById('errorBox').textContent) showError('Erreur: ' + err.message); show('errorBox'); }
  }
  async function renderCardView(merchant, card, customer) {
    document.getElementById('cardViewMerchant').textContent = merchant.business_name;
    document.getElementById('welcomeName').textContent = customer.first_name + ' ' + customer.last_name;
    document.getElementById('cardViewBrand').textContent = card.name; applyCardColors(card, 'cardBoxLive');
    document.getElementById('customerNumber').textContent = '#' + customer.qr_code.substring(0, 6).toUpperCase();
    const { data: stamps } = await supabase.from('stamps').select('stamps_count').eq('customer_id', customer.id);
    const totalStamps = (stamps || []).reduce((s, x) => s + (x.stamps_count || 0), 0);
    const filled = totalStamps % card.stamps_required;
    const remaining = card.stamps_required - filled;
    buildStampGrid('liveStampGrid', Math.min(card.stamps_required, 10), Math.min(filled, 10));
    document.getElementById('liveStampText').textContent = filled + ' / ' + card.stamps_required + ' tampons';
    document.getElementById('rewardStatus').textContent = remaining === 0 ? 'Recompense disponible !' : 'Plus que ' + remaining + ' tampon(s) avant : ' + card.reward_description;
      await ensureQR();
    try { const qr = qrcode(0, 'M'); qr.addData(customer.qr_code); qr.make(); const canvas = document.getElementById('qrCanvas'); const moduleSize = 6; const size = qr.getModuleCount() * moduleSize; canvas.width = size; canvas.height = size; const ctx = canvas.getContext('2d'); ctx.fillStyle = 'white'; ctx.fillRect(0,0,size,size); ctx.fillStyle = 'black'; for (let r = 0; r < qr.getModuleCount(); r++) for (let c = 0; c < qr.getModuleCount(); c++) if (qr.isDark(r,c)) ctx.fillRect(c*moduleSize, r*moduleSize, moduleSize, moduleSize); } catch(e) { console.error('QR error', e); }
    show('cardView');
  }
  document.getElementById('signupForm')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const merchant = window.__merchant;
    const card = window.__card;
    const submitBtn = document.getElementById('submitBtn');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Activation...';
    try {
      const payload = { merchant_id: merchant.id, card_id: card.id, first_name: document.getElementById('firstName').value.trim(), last_name: document.getElementById('lastName').value.trim(), email: document.getElementById('email').value.trim(), phone: document.getElementById('phone').value.trim() || null };
      const { data, error } = await supabase.from('customers').insert(payload).select().single();
      if (error) {
        if (error.code === '23505') {
          const { data: existing } = await supabase.from('customers').select('*').eq('merchant_id', merchant.id).eq('email', payload.email).single();
          if (existing) { location.href = location.pathname + '?m=' + merchant.slug + '&c=' + existing.qr_code; return; }
        }
        throw error;
      }
      location.href = location.pathname + '?m=' + merchant.slug + '&c=' + data.qr_code;
    } catch (err) { console.error(err); showError(err.message || 'Erreur inconnue'); submitBtn.disabled = false; submitBtn.textContent = 'Activer ma carte'; }
  });
</script>

<button id="pwaInstall" style="position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:9999;display:none;padding:12px 22px;border-radius:999px;border:none;background:#fff;color:#0b0b0c;font:600 14px/1 system-ui,-apple-system,sans-serif;box-shadow:0 8px 30px rgba(0,0,0,.35);cursor:pointer;">📲 Installer la carte</button>
<button id="pwaPush" style="position:fixed;bottom:18px;right:14px;z-index:9999;display:none;padding:10px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.25);background:rgba(0,0,0,.55);color:#fff;font:600 13px/1 system-ui,-apple-system,sans-serif;backdrop-filter:blur(10px);cursor:pointer;">🔔 Activer les notifications</button>
<script>
(function(){
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/fidelyoo/service-worker.js', { scope: '/fidelyoo/' }).catch(e => console.warn('SW reg failed', e));
    });
  }
  let deferredPrompt = null;
  const installBtn = document.getElementById('pwaInstall');
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    if (installBtn) installBtn.style.display = 'inline-block';
  });
  if (installBtn) {
    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBtn.style.display = 'none';
    });
  }
  window.addEventListener('appinstalled', () => { if (installBtn) installBtn.style.display = 'none'; });
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
  if (isIOS && !isStandalone && installBtn) {
    installBtn.textContent = '📲 Ajouter à l\u2019écran d\u2019accueil';
    installBtn.style.display = 'inline-block';
    installBtn.addEventListener('click', () => {
      alert('Sur iPhone : appuyez sur le bouton Partager puis « Sur l\u2019écran d\u2019accueil ».');
    });
  }
  const pushBtn = document.getElementById('pwaPush');
  if (pushBtn && 'Notification' in window && 'serviceWorker' in navigator) {
    if (Notification.permission === 'default') pushBtn.style.display = 'inline-block';
    pushBtn.addEventListener('click', async () => {
      try {
        const perm = await Notification.requestPermission();
        if (perm === 'granted') {
          pushBtn.style.display = 'none';
          const reg = await navigator.serviceWorker.ready;
          reg.showNotification('Fidelyoo', { body: 'Notifications activées 🎉', icon: 'https://api.dicebear.com/7.x/shapes/png?seed=fidelyoo&backgroundColor=0b0b0c&size=192' });
          try { localStorage.setItem('fidelyoo_push', '1'); } catch(e) {}
        }
      } catch(e) { console.warn(e); }
    });
  }
})();
</script>
</body>
</html>
