<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interface Caisse — Fidelyoo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Inter',sans-serif;background:#0f0f13;color:#f0ede8;}</style>
</head>
<body class="antialiased min-h-screen flex flex-col">
  <header class="border-b border-white/8 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-4">
      <a href="app.html" class="text-white/40 hover:text-white text-sm transition">← Dashboard</a>
      <span class="text-white/20">|</span>
      <span class="font-semibold">Interface Caisse</span>
    </div>
    <div class="text-white/40 text-sm" id="clock"></div>
  </header>
  <div class="flex-1 flex items-center justify-center p-8">
    <div class="w-full max-w-md">
      <div id="state-ready" class="text-center">
        <div class="w-48 h-48 mx-auto border-2 border-dashed border-violet-500/40 rounded-2xl flex items-center justify-center mb-6">
          <svg class="w-16 h-16 text-violet-400/50" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/></svg>
        </div>
        <h2 class="text-xl font-semibold mb-2">Prêt à scanner</h2>
        <p class="text-white/40 text-sm mb-6">Demandez à votre client de présenter son QR code</p>
        <button onclick="simulateScan()" class="bg-violet-600 hover:bg-violet-500 text-white font-medium px-8 py-3 rounded-xl transition mb-4 w-full">📱 Démarrer le scanner</button>
        <div class="relative my-4">
          <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div>
          <div class="relative flex justify-center"><span class="bg-[#0f0f13] px-3 text-white/30 text-xs">ou code manuel</span></div>
        </div>
        <form onsubmit="handleManualCode(event)" class="flex gap-2">
          <input type="text" id="manual-code" placeholder="Code client..." class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white placeholder-white/30 focus:outline-none focus:border-violet-500">
          <button type="submit" class="bg-white/10 hover:bg-white/15 text-white px-4 py-2.5 rounded-xl transition">OK</button>
        </form>
      </div>
      <div id="state-client" class="hidden">
        <div class="bg-white/5 border border-white/10 rounded-2xl p-6 mb-4 text-center">
          <div class="w-16 h-16 bg-violet-500/20 rounded-full flex items-center justify-center mx-auto mb-3"><span class="text-2xl">👤</span></div>
          <div class="font-semibold text-lg" id="client-name">Marie Dupont</div>
          <div class="text-white/40 text-sm mt-1" id="client-email"></div>
          <div class="mt-4"><span id="stamps-display"></span></div>
          <div class="text-white/50 text-sm mt-2" id="stamps-count">8 / 10 tampons</div>
        </div>
        <button onclick="addStamp()" class="bg-violet-600 hover:bg-violet-500 text-white font-semibold py-3 rounded-xl w-full mb-3 transition">✅ Valider (+1 tampon)</button>
        <button onclick="resetScan()" class="border border-white/10 text-white/60 hover:text-white py-2.5 rounded-xl w-full text-sm transition">Annuler</button>
      </div>
      <div id="state-success" class="hidden text-center">
        <div class="w-20 h-20 bg-emerald-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
          <svg class="w-10 h-10 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        </div>
        <h2 class="text-xl font-semibold text-emerald-400 mb-2">Tampon ajouté !</h2>
        <p class="text-white/40 text-sm mb-6" id="success-message"></p>
        <button onclick="resetScan()" class="bg-white/10 hover:bg-white/15 text-white px-8 py-2.5 rounded-xl transition">Nouveau scan</button>
      </div>
    </div>
  </div>
  <script>
    function updateClock(){const n=new Date();document.getElementById('clock').textContent=n.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});}
    updateClock();setInterval(updateClock,1000);
    function simulateScan(){showClient('Marie Dupont','marie@email.com',8,10);}
    function handleManualCode(e){e.preventDefault();const c=document.getElementById('manual-code').value;if(c)showClient('Client #'+c,'',3,10);}
    function showClient(name,email,stamps,total){
      document.getElementById('client-name').textContent=name;
      document.getElementById('client-email').textContent=email;
      document.getElementById('stamps-count').textContent=stamps+' / '+total+' tampons';
      let s='';for(let i=0;i<total;i++)s+=(i<stamps?'🟣':'⚪');
      document.getElementById('stamps-display').textContent=s;
      window._s=stamps;window._t=total;window._n=name;
      document.getElementById('state-ready').classList.add('hidden');
      document.getElementById('state-client').classList.remove('hidden');
    }
    function addStamp(){
      document.getElementById('success-message').textContent=window._n+' a maintenant '+(window._s+1)+'/'+window._t+' tampons';
      document.getElementById('state-client').classList.add('hidden');
      document.getElementById('state-success').classList.remove('hidden');
    }
    function resetScan(){
      ['state-client','state-success'].forEach(id=>document.getElementById(id).classList.add('hidden'));
      document.getElementById('state-ready').classList.remove('hidden');
      document.getElementById('manual-code').value='';
    }
  </script>
</body>
</html>
